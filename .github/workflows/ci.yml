name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov

      - name: Configure
        run: cmake -S . -B _build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build _build

      - name: Test
        run: ctest --test-dir _build --output-on-failure

      - name: Coverage
        run: |
          lcov --capture --directory _build --output-file coverage.info \
            --ignore-errors mismatch,inconsistent

          lcov --remove coverage.info '/usr/*' 'third-party/*' \
            --output-file coverage.info

          genhtml coverage.info --output-directory coverage

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.info
